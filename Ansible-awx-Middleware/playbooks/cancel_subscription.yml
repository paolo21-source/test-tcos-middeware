---
# playbooks/cancel_subscription.yml
# CANCEL Subscription
# Segue la logica: RETRIEVE_SUBSCRIPTION -> ASSIGN_CANCELLED_ROLE

- name: Cancel Subscription
  hosts: localhost
  gather_facts: false
  
  tasks:
    - name: Validate required variables
      assert:
        that:
          - external_id is defined and external_id != ""
          - request_id is defined
          - user_id is defined and user_id != ""     
        fail_msg: "Missing required variables: external_id, request_id, user_id"

    - name: Display operation summary
      debug:
        msg:
          - "=== CANCEL SUBSCRIPTION ==="
          - "External ID: {{ external_id }}"
          - "Request ID: {{ request_id }}"
# L'auth va presa dal secret provider_client_tag che viene passato dal middleware e identifica le credenziali da usare per autenticarsi con OpenStack, quindi non serve passare altre variabili per l'autenticazione se non il provider_client_tag stesso, che però non è definito in questo playbook ma viene passato direttamente dal middleware. Quindi il ruolo openstack_auth deve essere in grado di prendere il provider_client_tag dalle variabili di ambiente o dalle variabili passate dal middleware e usarlo per autenticarsi con OpenStack.
    # ========================================================================
    # AUTHENTICATION
    # ========================================================================
    - name: Authenticate with OpenStack
      include_role:
        name: openstack_auth

    # ========================================================================
    # STEP 1: RETRIEVE_SUBSCRIPTION_PROJECT_AND_GROUP
    # ========================================================================
    - name: "1) Check if SUBSCRIPTION project exists"
      include_role:
        name: openstack_project_check
      vars:
        project_name: "{{ external_id }}"
        check_sync_user_role: false

    - name: Verify SUBSCRIPTION project exists (fail if not found)
      assert:
        that:
          - project_id is defined
          - project_id != ""
        fail_msg: "ERROR: SUBSCRIPTION project not found for external_id {{ external_id }}"

    - name: Save SUBSCRIPTION project ID
      set_fact:
        subscription_project_id: "{{ project_id }}"

    - name: "2) Check if SUBSCRIPTION group exists"
      include_role:
        name: openstack_group
      vars:
        group_name: "{{ external_id }}"
        grant_role: false

    - name: Verify SUBSCRIPTION group exists (fail if not found)
      assert:
        that:
          - group_id is defined
          - group_id != ""
        fail_msg: "ERROR: SUBSCRIPTION group not found for external_id {{ external_id }}"

    - name: Save SUBSCRIPTION group ID
      set_fact:
        subscription_group_id: "{{ group_id }}"

    # ========================================================================
    # STEP 2: ASSIGN_CANCELLED_ROLE
    # ========================================================================
    - name: "3) Change group role to CANCELLED (revoke all, grant cancelled)"
      include_role:
        name: openstack_roles
      vars:
        target_project_id: "{{ subscription_project_id }}"
        target_group_id: "{{ subscription_group_id }}"
        target_role_id: "{{ cancelled_group_role_id }}"

#gli id vanno presi dalle configurazioni non li passa il middleware 
    # ========================================================================
    # COMPLETION
    # ========================================================================
    - name: Display completion summary
      debug:
        msg:
          - "=== CANCEL SUBSCRIPTION COMPLETED ==="
          - "SUBSCRIPTION Project ID: {{ subscription_project_id }}"
          - "SUBSCRIPTION Group ID: {{ subscription_group_id }}"
          - "Status: Cancelled"