---
# roles/openstack_project/tasks/main.yml
# Validazione rigorosa di tutti i parametri richiesti

- name: Validate openstack_project arguments
  assert:
    that:
      - project_name is defined and project_name != ""
      - parent_project_id is defined and parent_project_id != ""
      - request_id is defined and request_id != ""
      - user_id is defined and user_id != ""
      - external_id is defined and external_id != ""
      - subscription_id is defined and subscription_id != ""
      - product_id is defined and product_id != ""
      - hub_id is defined and hub_id != ""
      - cloudblue_template_id is defined and cloudblue_template_id != ""
      - user_email is defined and user_email != ""
      - is_first_subscription is defined 
      - is_first_subscription | bool == true or is_first_subscription | bool == false
    fail_msg: "Missing required parameters for openstack_project role"

- name: Check if project exists by name
  uri:
    url: "{{ provider_secret.endpoint }}/projects?name={{ project_name }}"
    method: GET
    headers:
      X-Auth-Token: "{{ auth_context.provider_token }}"
    status_code: 200
    return_content: yes
  register: project_search

- name: Set project_exists flag
  set_fact:
    project_context:
      project_exists: "{{ project_search.json.projects | length > 0 }}"
      project_id: "{{ project_search.json.projects[0].id if project_search.json.projects | length > 0 else '' }}"
      project_description: "{{ project_search.json.projects[0].description if project_search.json.projects | length > 0 else '' }}"

- name: Display project existence status
  debug:
    msg: "Project {{ project_name }} {{ 'exists (ID: ' + project_context.project_id + ', description: ' + project_context.project_description + ')' if project_context.project_exists else 'does not exist' }}"

- name: Create OpenStack project (if not exists)
  uri:
    url: "{{ provider_secret.endpoint }}/projects"
    method: POST
    headers:
      X-Auth-Token: "{{ auth_context.provider_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      project:
        name: "{{ project_name }}"
        description: "{{ project_description }}"
        parent_id: "{{ parent_project_id  }}"
        enabled: true
        requestId: "{{ request_id  }}"
        productId: "{{ product_id  }}"
        hubId: "{{ hub_id  }}"
        userId: "{{ user_id  }}"
        subscriptionId: "{{ subscription_id }}"
        externalId: "{{ external_id }}"
        isFirstSubscription: "{{ is_first_subscription }}"
        CloudBlueTemplateId: "{{ cloudblue_template_id }}"
        userEmail: "{{ user_email }}"
        type: "{{ project_type }}"
    status_code: 201
    return_content: yes
  register: project_create
  when: not project_context.project_exists


- name: Update project_id with newly created project
  set_fact:
    project_context:
      project_id: "{{ project_create.json.project.id }}"
      project_description: "{{ project_create.json.project.description }}"
  when: 
    - not project_context.project_exists
    - project_create.json.project.id is defined

- name: Display created project 
  debug:
    msg: "Project {{ project_name }} (ID: {{project_context.project_id}}, description: {{project_context.project_description}})" 

- name: Check if sync user role is assigned to project
  uri:
    url: "{{ provider_secret.endpoint }}/projects/{{ project_context.project_id }}/users/{{ provider_secret.syncUserId }}/roles/{{ provider_secret.syncRoleId }}"
    method: GET
    headers:
      X-Auth-Token: "{{ auth_context.provider_token }}"
    status_code: [204, 404]
  register: role_check

- name: Assign sync user to project (if not already assigned)
  uri:
    url: "{{ provider_secret.endpoint }}/projects/{{ project_context.project_id }}/users/{{ provider_secret.syncUserId }}/roles/{{ provider_secret.syncRoleId }}"
    method: PUT
    headers:
      X-Auth-Token: "{{ auth_context.provider_token }}"
    status_code: 204
  when: 
    - role_check.status == 404