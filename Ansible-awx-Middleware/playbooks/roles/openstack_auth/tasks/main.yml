# roles/openstack_auth/tasks/main.yml
---

# ============================================================
# VALIDATE
# ============================================================
- name: Validate project scope credentials
  assert:
    that:
      - provider_secret.projectId is defined
        or (provider_secret.projectName is defined and provider_secret.projectDomain is defined)
    fail_msg: "Either projectId or projectName + projectDomain must be provided."

- name: Validate user credentials
  assert:
    that:
      - provider_secret.userId is defined
        or (provider_secret.username is defined and provider_secret.userDomain is defined)
    fail_msg: "Either userId or username + userDomain must be provided."

# ============================================================
# BUILD PROJECT SCOPE
# ============================================================
- name: Set project scope by ID
  set_fact:
    auth_project_scope:
      id: "{{ provider_secret.projectId }}"
  when: provider_secret.projectId is defined

- name: Set project scope by name + domain
  set_fact:
    auth_project_scope:
      name: "{{ provider_secret.projectName }}"
      domain:
        name: "{{ provider_secret.projectDomain }}"
  when: provider_secret.projectId is not defined

# ============================================================
# BUILD USER IDENTITY
# ============================================================
- name: Set user credentials by userId
  set_fact:
    auth_user_identity:
      id: "{{ provider_secret.userId }}"
      password: "{{ provider_secret.password }}"
  when: provider_secret.userId is defined
  no_log: false

- name: Set user credentials by username + userDomain
  set_fact:
    auth_user_identity:
      name: "{{ provider_secret.username }}"
      password: "{{ provider_secret.password }}"
      domain:
        name: "{{ provider_secret.userDomain }}"
  when: provider_secret.userId is not defined
  no_log: false

# ============================================================
# AUTHENTICATE
# ============================================================
- name: Authenticate with OpenStack Keystone
  uri:
    url: "{{ provider_secret.endpoint }}/auth/tokens"
    method: POST
    body_format: json
    body:
      auth:
        identity:
          methods: ["password"]
          password:
            user: "{{ auth_user_identity }}"
        scope:
          project: "{{ auth_project_scope }}"
    status_code: 201
  register: auth_response
  no_log: false

# ============================================================
# SET FACTS - disponibili per tutti i ruoli successivi
# ============================================================
- name: Set facts for subsequent roles
  set_fact:
    auth_context:
      provider_token: "{{ auth_response.x_subject_token }}"
      nova_endpoint: "{{ auth_response.json.token.catalog | selectattr('type','equalto','compute') | map(attribute='endpoints') | flatten | selectattr('interface','equalto','public') | map(attribute='url') | first }}"
      cinder_endpoint: "{{ auth_response.json.token.catalog | selectattr('type','equalto','volumev3') | map(attribute='endpoints') | flatten | selectattr('interface','equalto','public') | map(attribute='url') | first }}"
      neutron_endpoint: "{{ auth_response.json.token.catalog | selectattr('type','equalto','network') | map(attribute='endpoints') | flatten | selectattr('interface','equalto','public') | map(attribute='url') | first }}"