---
# roles/openstack_group/tasks/main.yml

- name: Check if group exists by name and domain
  uri:
    url: "{{ provider_secret.endpoint }}/groups?name={{ group_name }}&domain_id={{ provider_secret.groupDomainId }}"
    method: GET
    headers:
      X-Auth-Token: "{{ auth_context.provider_token }}"
    status_code: 200
    return_content: yes
  register: group_search

- name: Set group_exists flag
  set_fact:
    group_context:
      group_exists: "{{ group_search.json.groups | length > 0 }}"
      group_id: "{{ group_search.json.groups[0].id if group_search.json.groups | length > 0 else '' }}"

- name: Display group existence status
  debug:
    msg: "Group '{{ group_name }}' {{ 'exists (ID: ' + group_context.group_id + ')' if group_context.group_exists else 'does not exist' }}"

- name: Create OpenStack group (if not exists)
  uri:
    url: "{{ provider_secret.endpoint }}/groups"
    method: POST
    headers:
      X-Auth-Token: "{{ auth_context.provider_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      group:
        name: "{{ group_name }}"
        domain_id: "{{ provider_secret.groupDomainId }}"
    status_code: 201
    return_content: yes
  register: group_create
  when: not group_context.group_exists

- name: Update group_id with newly created group
  set_fact:
    group_context:
      group_id: "{{ group_create.json.group.id }}"
  when: 
    - not group_context.group_exists
    - group_create.json.group.id is defined