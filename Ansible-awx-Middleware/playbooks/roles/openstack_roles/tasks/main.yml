---
# roles/openstack_roles/tasks/main.yml
- name: List current group roles on project
  uri:
    url: "{{ provider_client.endpoint }}/projects/{{ project_id }}/groups/{{ group_id }}/roles"
    method: GET
    headers:
      X-Auth-Token: "{{ auth_context.provider_token }}"
    status_code: 200
    return_content: yes
  register: current_roles

- name: Extract current role IDs
  set_fact:
    role_context:
      current_role_ids: "{{ current_roles.json.roles | map(attribute='id') | list }}"

- name: Check if target role is already assigned
  set_fact:
    role_checks:
      is_role_assigned: "{{ role_id in role_context.current_role_ids }}"

- name: Display role assignment status
  debug:
    msg: >
      {% if role_checks.is_role_assigned %}
      Target role already assigned - no changes needed (idempotent)
      {% else %}
      Target role not assigned - will update roles
      {% endif %}
    

#non sono tutti quanti che deve rimuovere ma solo i 3 che trovi nelle configurazioni quindi activegrouproleid, suspendedgrouproleid e cancelledgouproleid

- name: Revoke ALL existing roles from group (if target role not already assigned)
  uri:
    url: "{{ provider_client.endpoint }}/projects/{{ project_id }}/groups/{{ group_id }}/roles/{{ item }}"
    method: DELETE
    headers:
      X-Auth-Token: "{{ auth_context.provider_token }}"
    status_code: 
      - 204
      - 404  # Ignore if role was not assigned
  loop: "{{ current_role_ids }}"
  when: 
    - not role_checks.is_role_assigned | bool
    - current_role_ids | length > 0
    - item in handled_roles  # Only revoke roles that are in the handled_roles list
  
- name: Grant target role to group on project
  uri:
    url: "{{ provider_client.endpoint }}/projects/{{ project_id }}/groups/{{ group_id }}/roles/{{ role_id }}"
    method: PUT
    headers:
      X-Auth-Token: "{{ auth_context.provider_token }}"
    status_code: 204
  when: not role_checks.is_role_assigned | bool

- name: Display role change completion
  debug:
    msg: >
      {% if role_checks.is_role_assigned %}
      No changes made - target role already assigned
      {% else %}
      Revoked {{ current_role_ids | length }} existing role(s) and granted target role
      {% endif %}